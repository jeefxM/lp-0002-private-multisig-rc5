services:
  explorer_service:
    image: lez/explorer_service
    build:
      context: ../..
      dockerfile: lez/explorer_service/Dockerfile
    container_name: explorer_service
    environment:
      INDEXER_RPC_URL: ${INDEXER_RPC_URL:-http://host.docker.internal:8779}
    ports:
      - "8080:8080"
